<!--
  KAJABI: Paste in Product → Custom Code → Embedded Scripts
  (keep PASSGP_EMBED_API + PASSGP_EMBED_API_KEY config above this block)
-->

<script>
(function () {
  'use strict';
  window.__PASSGP_EMBED_PARENT__ = true;
  var API_BASE = (window.PASSGP_EMBED_API || '').replace(/\/$/, '');
  var API_KEY = (window.PASSGP_EMBED_API_KEY || '').trim();
  var CONTAINER_ID = 'passgp-pbi-report';
  var FULLSCREEN_LINK_ID = 'passgp-pbi-fullscreen';
  var FULLSCREEN_PATH = '/kajabi-fullscreen.html';
  var pendingTargets = [];
  var sessionFetch = null;
  var cachedSession = null;
  var iframeBound = false;
  var pollTimer = null;

  function getMemberId() {
    try {
      var u = window.Kajabi && window.Kajabi.currentSiteUser;
      if (!u) return '';
      var cid = u.contactId == null ? '' : String(u.contactId).trim();
      if (cid && cid.toLowerCase() !== 'null') return cid;
      var id = u.id == null ? '' : String(u.id).trim();
      if (id && id.toLowerCase() !== 'null') return id;
      return '';
    } catch (e) { return ''; }
  }
  function getMemberEmail() {
    try {
      var u = window.Kajabi && window.Kajabi.currentSiteUser;
      if (!u) return '';
      var email = u.email == null ? '' : String(u.email).trim();
      if (email && email.toLowerCase() !== 'null') return email;
      return '';
    } catch (e) { return ''; }
  }
  function waitForMemberId(maxMs) {
    return new Promise(function (resolve, reject) {
      var elapsed = 0, step = 250;
      var timer = setInterval(function () {
        var id = getMemberId();
        if (id) { clearInterval(timer); resolve(id); return; }
        elapsed += step;
        if (elapsed >= maxMs) {
          clearInterval(timer);
          reject(new Error('Kajabi member_id not available. Please log in and refresh.'));
        }
      }, step);
    });
  }
  async function hmacSha256Hex(secret, message) {
    var enc = new TextEncoder();
    var key = await crypto.subtle.importKey(
      'raw', enc.encode(secret), { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
    );
    var sig = await crypto.subtle.sign('HMAC', key, enc.encode(message));
    return Array.from(new Uint8Array(sig))
      .map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  async function buildSignedPayload(memberId) {
    var ts = Date.now();
    var sig = await hmacSha256Hex(API_KEY, memberId + ':' + ts);
    return { memberId: memberId, ts: ts, sig: sig };
  }
  function isPassgpFrame(el) {
    if (!el || el.tagName !== 'IFRAME') return false;
    var src = (el.getAttribute('src') || '').toLowerCase();
    return src.indexOf('kajabi-frame.html') !== -1 || src.indexOf('power-bi-embed') !== -1;
  }
  function findEmbedIframe() {
    var byId = document.getElementById(CONTAINER_ID);
    if (byId && byId.tagName === 'IFRAME') return byId;
    var iframes = document.querySelectorAll('iframe');
    for (var i = 0; i < iframes.length; i++) {
      if (isPassgpFrame(iframes[i])) return iframes[i];
    }
    return null;
  }
  function postToFrame(targetWindow, message) {
    if (!targetWindow || !API_BASE) return false;
    try {
      targetWindow.postMessage(message, API_BASE);
      return true;
    } catch (e) { return false; }
  }
  function queueTarget(targetWindow) {
    if (!targetWindow) return;
    for (var i = 0; i < pendingTargets.length; i++) {
      if (pendingTargets[i] === targetWindow) return;
    }
    pendingTargets.push(targetWindow);
  }
  function sendError(targetWindow, message) {
    postToFrame(targetWindow, { type: 'passgp-embed-error', error: message });
  }
  function deliverSession(targetWindow, session) {
    postToFrame(targetWindow, { type: 'passgp-embed-data', session: session });
  }
  async function fetchEmbedSession() {
    if (!API_BASE) throw new Error('PASSGP_EMBED_API is not configured.');
    if (!API_KEY) throw new Error('PASSGP_EMBED_API_KEY is not configured.');
    await waitForMemberId(10000);
    var memberId = getMemberId();
    var payload = await buildSignedPayload(memberId);
    var email = getMemberEmail();
    if (email) payload.email = email;
    var res = await fetch(API_BASE + '/api/powerbi/embed-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not load dashboard');
    if (!data.rlsUsername && !data.memberId) throw new Error('Could not resolve member');
    return data;
  }
  function ensureSessionFetch() {
    if (cachedSession) return Promise.resolve(cachedSession);
    if (sessionFetch) return sessionFetch;
    sessionFetch = fetchEmbedSession()
      .then(function (data) { cachedSession = data; return data; })
      .finally(function () { sessionFetch = null; });
    return sessionFetch;
  }
  async function servePendingTargets() {
    if (!pendingTargets.length) return;
    var targets = pendingTargets.slice();
    pendingTargets = [];
    try {
      var session = await ensureSessionFetch();
      for (var j = 0; j < targets.length; j++) deliverSession(targets[j], session);
    } catch (err) {
      var msg = err && err.message ? err.message : 'Could not load dashboard';
      for (var i = 0; i < targets.length; i++) sendError(targets[i], msg);
    }
    if (pendingTargets.length) servePendingTargets();
  }
  function onFrameReady(sourceWindow) {
    if (!sourceWindow) return;
    if (cachedSession) { deliverSession(sourceWindow, cachedSession); return; }
    queueTarget(sourceWindow);
    servePendingTargets();
  }
  function bindFullscreenLink() {
    if (!API_BASE) return;
    var link = document.getElementById(FULLSCREEN_LINK_ID);
    if (!link || link.dataset.passgpBound === '1') return;
    link.dataset.passgpBound = '1';
    link.href = API_BASE + FULLSCREEN_PATH;
    link.target = '_blank';
    link.addEventListener('click', function (e) {
      e.preventDefault();
      var win = window.open(API_BASE + FULLSCREEN_PATH, 'passgp-pbi-fullscreen');
      if (!win) return;
      onFrameReady(win);
    });
  }
  function bindIframe(iframe) {
    if (iframe.dataset.passgpIframeBound === '1') return;
    iframe.dataset.passgpIframeBound = '1';
    iframeBound = true;
    function tryQueue() {
      if (iframe.contentWindow) onFrameReady(iframe.contentWindow);
    }
    iframe.addEventListener('load', tryQueue);
    tryQueue();
    setTimeout(tryQueue, 500);
  }
  function bootIframe() {
    var iframe = findEmbedIframe();
    if (!iframe) return false;
    bindIframe(iframe);
    return true;
  }
  function stopPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }
  function boot() {
    bindFullscreenLink();
    bootIframe();
    if (iframeBound && cachedSession) stopPoll();
  }
  window.addEventListener('message', function (event) {
    if (event.origin !== API_BASE) return;
    if (!event.data || event.data.type !== 'passgp-embed-ready') return;
    onFrameReady(event.source);
  });
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else { boot(); }
  var poll = 0;
  pollTimer = setInterval(function () {
    poll += 1;
    boot();
    if (poll > 40 || (iframeBound && cachedSession)) stopPoll();
  }, 500);
})();
</script>
