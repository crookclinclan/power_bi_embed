<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGP Analytics — Full Screen</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #fff; }
    #passgp-pbi-report { width: 100%; height: 100vh; }
    #passgp-pbi-report iframe {
      width: 100% !important;
      height: 100vh !important;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <div id="passgp-pbi-report"></div>
  <script src="/kajabi-embed-runner.js"></script>
  <script src="/pbi-embed-helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <script>
    (function () {
      'use strict';

      var container = document.getElementById('passgp-pbi-report');
      var started = false;
      var pingCount = 0;
      var pingTimer = null;
      var allowedOrigins = [
        'https://www.passgp.au',
        'https://passgp.au',
        'http://localhost:5051',
        'http://127.0.0.1:5051',
      ];

      function stopPinging() {
        if (pingTimer) {
          clearInterval(pingTimer);
          pingTimer = null;
        }
      }

      function isAllowedOrigin(origin) {
        if (!origin) return false;
        for (var i = 0; i < allowedOrigins.length; i++) {
          if (origin === allowedOrigins[i]) return true;
        }
        return false;
      }

      function pingOpener() {
        if (started) return;
        var msg = { type: 'passgp-embed-ready' };
        try {
          if (window.opener && !window.opener.closed) {
            window.opener.postMessage(msg, '*');
          }
        } catch (e) {}
      }

      async function renderSession(session) {
        if (started) return;
        started = true;
        stopPinging();
        PassgpKajabiEmbed.showLoading(container, 'Loading your dashboard…');
        try {
          if (!window.PassgpPbiEmbed) {
            throw new Error('Power BI embed library failed to load.');
          }
          window.PassgpPbiEmbed.embedPassgpReport(container, session);
        } catch (e) {
          PassgpKajabiEmbed.showError(container, e.message || 'Could not display dashboard.');
        }
      }

      PassgpKajabiEmbed.showLoading(container, 'Loading your dashboard…');

      window.addEventListener('message', function (event) {
        if (!isAllowedOrigin(event.origin)) return;
        var data = event.data || {};

        if (data.type === 'passgp-embed-data' && data.session) {
          renderSession(data.session);
          return;
        }

        if (data.type === 'passgp-embed-error' && !started) {
          started = true;
          stopPinging();
          PassgpKajabiEmbed.showError(container, data.error || 'Could not load dashboard.');
        }
      });

      pingOpener();
      pingTimer = setInterval(function () {
        pingCount += 1;
        pingOpener();
        if (started || pingCount > 30) {
          stopPinging();
          if (!started) {
            PassgpKajabiEmbed.showError(
              container,
              'Could not connect to PassGP. Close this tab and use View full screen from your dashboard.',
            );
          }
        }
      }, 1000);
    })();
  </script>
</body>
</html>
