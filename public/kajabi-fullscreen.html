<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassGP Analytics — Full Screen</title>
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #fff; }
    #passgp-pbi-report { width: 100%; height: 100vh; }
    #passgp-pbi-report iframe {
      width: 100% !important;
      height: 100vh !important;
      border: 0;
      display: block;
    }
    #passgp-debug {
      display: none;
      font: 11px/1.5 ui-monospace, monospace;
      color: #475569;
      padding: 8px 12px;
      border-top: 1px solid #e2e8f0;
      background: #f8fafc;
      white-space: pre-wrap;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div id="passgp-pbi-report"></div>
  <div id="passgp-debug"></div>
  <script src="/kajabi-embed-runner.js"></script>
  <script src="/pbi-embed-helpers.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.23.1/dist/powerbi.min.js"></script>
  <script>
    (function () {
      'use strict';

      var container = document.getElementById('passgp-pbi-report');
      var debugEl = document.getElementById('passgp-debug');
      var debug = /(?:^|[?&])debug=1(?:&|$)/.test(location.search);
      var handoffId = new URLSearchParams(location.search).get('h');

      if (debug && debugEl) debugEl.style.display = 'block';

      function log(line) {
        if (!debug || !debugEl) return;
        debugEl.textContent = (debugEl.textContent ? debugEl.textContent + '\n' : '') + line;
      }

      async function renderSession(session) {
        PassgpKajabiEmbed.showLoading(container, 'Loading your dashboard…');
        try {
          if (!window.PassgpPbiEmbed) {
            throw new Error('Power BI embed library failed to load.');
          }
          window.PassgpPbiEmbed.embedPassgpReport(container, session);
          if (debugEl) debugEl.style.display = 'none';
        } catch (e) {
          PassgpKajabiEmbed.showError(container, e.message || 'Could not display dashboard.');
          log('embed error: ' + (e.message || e));
        }
      }

      async function loadFromHandoff() {
        if (!handoffId) {
          PassgpKajabiEmbed.showError(
            container,
            'Open full screen from your Performance Analytics dashboard (link below the report).',
          );
          log('missing ?h= handoff id');
          return;
        }

        log('handoff id: ' + handoffId.slice(0, 8) + '…');
        PassgpKajabiEmbed.showLoading(container, 'Loading your dashboard…');

        try {
          var res = await fetch('/api/powerbi/handoff/' + encodeURIComponent(handoffId));
          var data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || 'Handoff expired — go back and click View full screen again');
          }
          log('handoff ok — embedding');
          await renderSession(data);
        } catch (e) {
          PassgpKajabiEmbed.showError(container, e.message || 'Could not load dashboard.');
          log('handoff error: ' + (e.message || e));
        }
      }

      loadFromHandoff();
    })();
  </script>
</body>
</html>
